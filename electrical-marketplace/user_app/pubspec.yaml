name: user_app
description: Electrical & Electronics Marketplace - User App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.4.3+1

  # Navigation
  go_router: ^14.2.7

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # OTP Input
  pinput: ^5.0.0

  # Toast Messages
  fluttertoast: ^8.2.8

  # Date/Number Formatting
  intl: ^0.19.0

  # Payment
  razorpay_flutter: ^1.3.7

  # Image Loading
  cached_network_image: ^3.3.1

  # Loading Shimmer
  shimmer: ^3.0.0

  # Cart Badge
  badges: ^3.1.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
